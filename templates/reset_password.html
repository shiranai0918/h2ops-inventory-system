{% extends "base.html" %}
{% block page_title %}Reset Password{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card card">
        <div class="login-header">
            <i class="fa-solid fa-shield-halved text-cyan" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h2>Create New Password</h2>
            <p>Please enter your new password below.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="login-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter new password" required autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
