{% extends "base.html" %}
{% block page_title %}Edit User: {{ user.username }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ user.username }}" required style="padding-left: 12px;">
        </div>

        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ user.email or '' }}" required style="padding-left: 12px;">
        </div>

        <div class="form-group">
            <label for="branch_id">Assigned Branch</label>
            <select name="branch_id" id="branch_id" class="form-control" style="padding-left: 12px; appearance: auto;">
                <option value="" {% if not user.branch_id %}selected{% endif %}>No Branch (Global Access)</option>
                {% for branch in branches %}
                <option value="{{ branch.id }}" {% if user.branch_id == branch.id %}selected{% endif %}>{{ branch.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="role">User Role</label>
            <select name="role" id="role" class="form-control" style="padding-left: 12px; appearance: auto;">
                <option value="staff" {% if user.role == 'staff' %}selected{% endif %}>Staff (Standard Access)</option>
                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin (Full Access)</option>
            </select>
        </div>

        <div class="form-group" style="background: var(--bg-light); padding: 15px; border-radius: 8px; margin-top: 20px;">
            <label for="password">Change Password <small style="color: var(--text-gray); font-weight: normal;">(Leave blank to keep current password)</small></label>
            <input type="password" id="password" name="password" class="form-control" placeholder="New password" style="padding-left: 12px; background: white;">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary">Update User</button>
            <a href="{{ url_for('users.index') }}" class="btn" style="background: #eee; text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
