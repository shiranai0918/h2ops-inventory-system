{% extends "base.html" %}
{% block page_title %}Forgot Password{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card card">
        <div class="login-header">
            <i class="fa-solid fa-unlock-keyhole text-cyan" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h2>Account Recovery</h2>
            <p>Enter your email to receive a password reset link.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Enter your registered email" required autofocus>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
        </form>
        
        <div class="text-center mt-3" style="margin-top: 1.5rem;">
            <a href="{{ url_for('auth.login') }}" class="text-muted" style="text-decoration: none; font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
